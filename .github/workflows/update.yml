name: Update Providers

on:
  schedule:
    - cron: "0 */6 * * *" # Run every 6 hours
      timezone: "America/New_York"
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  update-providers:
    name: Update Providers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: AIHubMix
        run: go run ./cmd/aihubmix/main.go
        continue-on-error: true

      - name: Avian
        run: go run ./cmd/avian/main.go
        continue-on-error: true

      - name: Neuralwatt
        run: go run ./cmd/neuralwatt/main.go
        continue-on-error: true

      - name: Chutes
        run: go run ./cmd/chutes/main.go
        continue-on-error: true

      - name: Cortecs
        run: go run ./cmd/cortecs/main.go
        continue-on-error: true

      - name: HuggingFace
        run: go run ./cmd/huggingface/main.go
        continue-on-error: true

      - name: io.net
        run: go run ./cmd/ionet/main.go
        continue-on-error: true

      - name: OpenCode Go
        run: go run ./cmd/opencode-go/main.go
        continue-on-error: true

      - name: OpenCode Zen
        run: go run ./cmd/opencode-zen/main.go
        continue-on-error: true

      - name: OpenRouter
        run: go run ./cmd/openrouter/main.go
        continue-on-error: true

      - name: Synthetic
        run: go run ./cmd/synthetic/main.go
        continue-on-error: true

      - name: Pioneer
        run: go run ./cmd/pioneer/main.go
        continue-on-error: true

      - name: Venice
        run: go run ./cmd/venice/main.go
        continue-on-error: true

      - name: Vercel
        run: go run ./cmd/vercel/main.go
        continue-on-error: true

      - name: xAI
        run: go run ./cmd/xai/main.go
        continue-on-error: true
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          title: "chore: auto-update generated files"
          body: ""
          commit-message: "chore: auto-update generated files"
          branch: update-providers
          reviewers: andreynering,meowgorithm,yamcharm1111
